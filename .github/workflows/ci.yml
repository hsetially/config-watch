name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/config_watch_test
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  checks:
    name: Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgit2-dev pkg-config

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: config_watch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgit2-dev pkg-config

      - name: Install difftastic
        run: cargo install difftastic

      - name: Run tests
        run: cargo test --workspace --all-targets

      - name: Run ignored tests (difftastic)
        run: cargo test --workspace -- --ignored

  build-binaries:
    name: Build Binaries (${{ matrix.os }})
    needs: [checks]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            static_flags: ""
            pkg_install: |
              sudo apt-get update
              sudo apt-get install -y libgit2-dev pkg-config

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
            static_flags: "-C target-feature=+crt-static"
            pkg_install: |
              echo "No system deps needed on Windows (libgit2 vendored)"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: ${{ matrix.pkg_install }}

      - name: Set static flags (Windows)
        if: matrix.os == 'windows-latest'
        run: echo "RUSTFLAGS=${{ matrix.static_flags }}" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Build control-plane
        run: cargo build --release -p config-control-plane --target ${{ matrix.target }}

      - name: Build agent
        run: cargo build --release -p config-agent --target ${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release -p config-cli --target ${{ matrix.target }}

      - name: Upload artifacts (${{ matrix.os }})
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}
          path: |
            target/${{ matrix.target }}/release/config-control-plane${{ matrix.ext }}
            target/${{ matrix.target }}/release/config-agent${{ matrix.ext }}
            target/${{ matrix.target }}/release/config-cli${{ matrix.ext }}

  build-dashboard:
    name: Build Web Dashboard
    runs-on: ubuntu-latest
    needs: [checks]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install trunk
        run: cargo install trunk

      - name: Build dashboard
        working-directory: web/dashboard
        run: trunk build --release

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: config-dashboard
          path: web/dashboard/dist/

  build-rocky8:
    name: Build Check (Rocky Linux 8 — glibc 2.28, libssl.so.1.1)
    needs: [checks]
    runs-on: ubuntu-latest
    container:
      image: rockylinux:8
    steps:
      - name: Install build dependencies
        run: |
          # `curl` intentionally omitted — rockylinux ships curl-minimal and
          # installing full curl conflicts. curl-minimal is enough for rustup.
          dnf install -y epel-release
          dnf install -y gcc gcc-c++ make cmake pkgconf-pkg-config \
                         openssl-devel ca-certificates git tar gzip

      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2
        with:
          key: rocky8-ci

      - name: Build release binaries
        run: cargo build --release -p config-control-plane -p config-agent -p config-cli

      - name: Verify Rocky 8 linkage
        run: |
          for b in config-control-plane config-agent config-cli; do
            if ldd target/release/$b | grep -q 'libssl.so.3'; then
              echo "FAIL: $b links libssl.so.3 — will not load on Rocky 8" >&2
              exit 1
            fi
          done

  build-rocky9:
    name: Build Check (Rocky Linux 9 — glibc 2.34, libssl.so.3)
    needs: [checks]
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9
    steps:
      - name: Install build dependencies
        run: |
          # `curl` intentionally omitted — rockylinux ships curl-minimal and
          # installing full curl conflicts. curl-minimal is enough for rustup.
          dnf install -y epel-release
          dnf install -y gcc gcc-c++ make cmake pkgconf-pkg-config \
                         openssl-devel ca-certificates git tar gzip

      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2
        with:
          key: rocky9-ci

      - name: Build release binaries
        run: cargo build --release -p config-control-plane -p config-agent -p config-cli
