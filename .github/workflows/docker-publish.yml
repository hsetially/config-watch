name: Publish Docker Images

on:
  push:
    branches: [main, master]
    paths:
      - "crates/**"
      - "web/dashboard/**"
      - "docker/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  resolve:
    name: Resolve version & image refs
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      owner_lc: ${{ steps.owner.outputs.owner_lc }}
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Read workspace version from Cargo.toml
        id: version
        shell: bash
        run: |
          ver=$(awk -F\" '/^\[workspace.package\]/{flag=1; next} flag && /^version[[:space:]]*=/{print $2; exit}' Cargo.toml)
          if [ -z "$ver" ]; then
            echo "Failed to read [workspace.package].version from Cargo.toml" >&2
            exit 1
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Version: $ver"

      - name: Lowercase repo owner
        id: owner
        shell: bash
        run: echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Short SHA
        id: sha
        shell: bash
        run: echo "short_sha=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

  build-control-plane:
    name: Build & push control-plane (${{ matrix.base }})
    needs: [resolve]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Debian 12 (glibc 2.36, libssl.so.3) — the historical default. No suffix.
          - base: debian
            dockerfile: docker/Dockerfile.control-plane
            suffix: ""
            cache_scope: control-plane
          # Rocky Linux 8 (glibc 2.28, libssl.so.1.1) — RHEL 8 / Rocky 8 / Alma 8.
          - base: rocky8
            dockerfile: docker/Dockerfile.control-plane.rocky8
            suffix: "-rocky8"
            cache_scope: control-plane-rocky8
          # Rocky Linux 9 (glibc 2.34, libssl.so.3) — RHEL 9 / Rocky 9 / Alma 9.
          - base: rocky9
            dockerfile: docker/Dockerfile.control-plane.rocky9
            suffix: "-rocky9"
            cache_scope: control-plane-rocky9
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        shell: bash
        run: |
          image="${{ env.REGISTRY }}/${{ needs.resolve.outputs.owner_lc }}/config-watch-control-plane"
          ver="${{ needs.resolve.outputs.version }}"
          sha="${{ needs.resolve.outputs.short_sha }}"
          suffix="${{ matrix.suffix }}"
          # Debian variant keeps the legacy tag names so existing pins do not break.
          # Rocky variants carry a -rocky8 / -rocky9 suffix on every tag.
          if [ -z "$suffix" ]; then
            moving="latest"
          else
            moving="${suffix#-}"   # e.g. "rocky8"
          fi
          {
            echo "tags<<EOF"
            echo "${image}:${ver}${suffix}"
            echo "${image}:${ver}${suffix}-sha-${sha}"
            echo "${image}:sha-${sha}${suffix}"
            echo "${image}:${moving}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,scope=${{ matrix.cache_scope }},mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.resolve.outputs.version }}
            io.configwatch.base=${{ matrix.base }}

  build-dashboard:
    name: Build & push dashboard
    needs: [resolve]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        shell: bash
        run: |
          image="${{ env.REGISTRY }}/${{ needs.resolve.outputs.owner_lc }}/config-watch-dashboard"
          ver="${{ needs.resolve.outputs.version }}"
          sha="${{ needs.resolve.outputs.short_sha }}"
          {
            echo "tags<<EOF"
            echo "${image}:${ver}"
            echo "${image}:${ver}-sha-${sha}"
            echo "${image}:sha-${sha}"
            echo "${image}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.dashboard
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,scope=dashboard,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.resolve.outputs.version }}

  summary:
    name: Publish summary
    needs: [resolve, build-control-plane, build-dashboard]
    runs-on: ubuntu-latest
    steps:
      - name: Print image refs
        shell: bash
        run: |
          image_cp="${{ env.REGISTRY }}/${{ needs.resolve.outputs.owner_lc }}/config-watch-control-plane"
          image_db="${{ env.REGISTRY }}/${{ needs.resolve.outputs.owner_lc }}/config-watch-dashboard"
          ver="${{ needs.resolve.outputs.version }}"
          sha="${{ needs.resolve.outputs.short_sha }}"
          {
            echo "### Published images"
            echo ""
            echo "| Image | Base | Unique tag | Moving tag |"
            echo "|---|---|---|---|"
            echo "| control-plane | Debian 12 | \`${image_cp}:${ver}-sha-${sha}\` | \`${image_cp}:${ver}\` / \`:latest\` |"
            echo "| control-plane | Rocky 8   | \`${image_cp}:${ver}-rocky8-sha-${sha}\` | \`${image_cp}:${ver}-rocky8\` / \`:rocky8\` |"
            echo "| control-plane | Rocky 9   | \`${image_cp}:${ver}-rocky9-sha-${sha}\` | \`${image_cp}:${ver}-rocky9\` / \`:rocky9\` |"
            echo "| dashboard     | Alpine (nginx) | \`${image_db}:${ver}-sha-${sha}\` | \`${image_db}:${ver}\` / \`:latest\` |"
            echo ""
            echo "> Moving tags (\`${ver}\`, \`:latest\`, \`:rocky8\`, \`:rocky9\`) are overwritten on each publish. Pin to \`-sha-${sha}\` tags or digests for reproducible deploys. Bump \`[workspace.package].version\` in \`Cargo.toml\` before the next push if you want a fresh version tag."
          } >> "$GITHUB_STEP_SUMMARY"
