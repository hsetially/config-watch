server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Ensure the WASM bundle is served with the right MIME type for streaming compile.
    types {
        application/wasm    wasm;
        application/javascript js mjs;
        text/css            css;
        text/html           html;
        image/svg+xml       svg;
        image/png           png;
        image/x-icon        ico;
    }
    default_type application/octet-stream;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/wasm application/json image/svg+xml;

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }
}
